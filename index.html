<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PROJECT NOVA — Configurator</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
  }
}
</script>
<style>
  :root{
    --bg:#0b0d10; --panel:#101317; --panel2:#181c20; --panel3:#1f2429;
    --border:#1c2024; --border2:#22262b; --accent:#00b8a9; --accent-ink:#08110f;
    --text:#e7ecee; --muted:#8b9296; --muted2:#565d62;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--text);
    font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif; overflow:hidden; }
  #app{ display:flex; flex-direction:column; height:100%; }

  .topbar{ display:flex; align-items:center; justify-content:space-between;
    padding:12px 18px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .brand{ display:flex; align-items:baseline; gap:10px; }
  .brand .mark{ font-size:13px; letter-spacing:.25em; color:var(--accent); font-weight:600; }
  .brand .sub{ font-size:13px; color:var(--muted2); }
  .hint{ font-size:11px; color:var(--muted2); letter-spacing:.02em; }

  .body{ display:flex; flex:1; min-height:0; }
  .viewport{ position:relative; flex:1; min-width:0; }
  #canvas-host{ position:absolute; inset:0; }
  #canvas-host canvas{ display:block; width:100%; height:100%; }

  .drop-overlay{ position:absolute; inset:10px; border:2px dashed var(--accent);
    border-radius:10px; background:rgba(0,184,169,0.08); display:none;
    align-items:center; justify-content:center; font-size:13px; color:var(--accent);
    letter-spacing:.05em; pointer-events:none; z-index:5; }
  .drop-overlay.show{ display:flex; }

  .viewport-tag{ position:absolute; top:14px; left:14px; font-size:11px; color:var(--muted2);
    letter-spacing:.02em; background:rgba(11,13,16,0.6); padding:4px 8px; border-radius:6px; }
  .viewport-actions{ position:absolute; bottom:14px; right:14px; display:flex; gap:8px; }
  .btn{ border:none; cursor:pointer; border-radius:6px; font-weight:600; letter-spacing:.02em;
    font-size:12px; padding:9px 14px; transition:background .15s ease; }
  .btn-accent{ background:var(--accent); color:var(--accent-ink); }
  .btn-accent:hover{ background:#12d1c1; }
  .btn-ghost{ background:var(--panel2); color:var(--muted); }
  .btn-ghost:hover{ background:var(--panel3); color:var(--text); }

  .panel{ width:360px; flex-shrink:0; border-left:1px solid var(--border);
    background:var(--panel); display:flex; flex-direction:column; }
  .tabs{ display:flex; flex-wrap:wrap; gap:4px; padding:8px; border-bottom:1px solid var(--border); }
  .tab{ border:none; cursor:pointer; padding:6px 10px; border-radius:5px; font-size:11px;
    letter-spacing:.02em; font-weight:500; background:var(--panel2); color:#9aa3a8; }
  .tab.active{ background:var(--accent); color:var(--accent-ink); }
  .tab:hover:not(.active){ background:var(--panel3); }

  .panel-body{ flex:1; overflow-y:auto; padding:16px; }
  .panel-body h3{ font-size:11px; letter-spacing:.15em; color:var(--muted2); margin:0 0 12px; font-weight:600; }
  .section{ margin-bottom:22px; }
  .section:last-child{ margin-bottom:0; }

  .import-zone{ border:1.5px dashed var(--border2); border-radius:8px; padding:18px;
    text-align:center; font-size:12px; color:var(--muted); cursor:pointer; }
  .import-zone:hover{ border-color:var(--accent); color:var(--text); }
  .import-zone b{ color:var(--accent); }

  .file-meta{ margin-top:12px; font-size:11px; color:var(--muted); line-height:1.7; }
  .file-meta b{ color:var(--text); }

  .node-row{ display:flex; align-items:center; gap:8px; padding:4px 0; font-size:12px; color:#c7ccce; }
  .node-row input[type=checkbox]{ accent-color:var(--accent); }
  .node-depth{ color:var(--muted2); font-size:10px; width:14px; text-align:right; flex-shrink:0; }

  .mat-card{ background:var(--panel2); border:1px solid var(--border2); border-radius:8px;
    padding:10px; margin-bottom:10px; }
  .mat-card .name{ font-size:11px; color:var(--muted); margin-bottom:8px; word-break:break-all; }
  .row{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px; }
  .row label{ font-size:10px; color:var(--muted2); width:70px; flex-shrink:0; }
  .row input[type=range]{ flex:1; accent-color:var(--accent); }
  .row input[type=color]{ width:100%; height:28px; border:1px solid var(--border2); border-radius:5px;
    background:transparent; cursor:pointer; }

  .clip-row{ background:var(--panel2); border:1px solid var(--border2); border-radius:8px;
    padding:10px 12px; margin-bottom:8px; }
  .clip-row .top{ display:flex; align-items:center; justify-content:between; gap:10px; }
  .clip-row .top .name{ font-size:12px; color:var(--text); flex:1; }
  .clip-row .meta{ font-size:10px; color:var(--muted2); margin-top:3px; }

  .toggle{ width:38px; height:20px; border-radius:999px; position:relative; border:none;
    cursor:pointer; background:var(--panel3); flex-shrink:0; }
  .toggle.on{ background:var(--accent); }
  .toggle .knob{ position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%;
    background:var(--bg); transition:transform .15s ease; }
  .toggle.on .knob{ transform:translateX(18px); }

  .telemetry-row{ display:flex; align-items:baseline; justify-content:space-between;
    border-bottom:1px solid var(--border); padding:8px 0; }
  .telemetry-row .label{ font-size:11px; color:var(--muted); }
  .telemetry-row .value{ font-size:16px; font-variant-numeric:tabular-nums;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  .telemetry-row .unit{ font-size:10px; color:var(--muted2); margin-left:4px; }

  .note{ font-size:10px; color:var(--muted2); line-height:1.6; margin-top:10px; }

  .empty{ font-size:12px; color:var(--muted2); }

  .snap-card{ border:1px solid var(--border2); border-radius:8px; overflow:hidden; margin-bottom:10px; }
  .snap-card img{ width:100%; display:block; }
  .snap-meta{ display:flex; justify-content:space-between; padding:6px 8px; font-size:10px; color:var(--muted); }
  .snap-meta a{ color:var(--accent); text-decoration:none; }

  .footer-btn{ padding:10px; border-top:1px solid var(--border); }
  .footer-btn button{ width:100%; }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--border2); border-radius:4px; }

  #loading{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(11,13,16,0.75); font-size:12px; color:var(--accent); letter-spacing:.1em;
    z-index:6; display:none; }
  #loading.show{ display:flex; }

  #file-input{ display:none; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="brand">
      <span class="mark">PROJECT NOVA</span>
      <span class="sub">Configurator — Core Demo</span>
    </div>
    <div class="hint">drag to orbit · scroll to zoom · drop a .glb / .gltf / .fbx to import</div>
  </div>

  <div class="body">
    <div class="viewport" id="viewport">
      <div id="canvas-host"></div>
      <div class="drop-overlay" id="drop-overlay">Drop model file(s) to import</div>
      <div id="loading">LOADING MODEL…</div>
      <div class="viewport-tag" id="viewport-tag">Demo concept vehicle</div>
      <div class="viewport-actions">
        <button class="btn btn-ghost" id="btn-reset">Reset to demo vehicle</button>
        <button class="btn btn-accent" id="btn-snapshot">Capture snapshot</button>
      </div>
    </div>

    <div class="panel">
      <div class="tabs">
        <button class="tab active" data-tab="model">Model</button>
        <button class="tab" data-tab="materials">Materials</button>
        <button class="tab" data-tab="animation">Animation</button>
        <button class="tab" data-tab="telemetry">Telemetry</button>
        <button class="tab" data-tab="snapshots">Snapshots</button>
      </div>

      <div class="panel-body" id="panel-body"></div>

      <div class="footer-btn">
        <button class="btn btn-ghost" id="btn-export">Export configuration (.json)</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-input" multiple accept=".glb,.gltf,.fbx,.bin,.png,.jpg,.jpeg,.webp" />

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// -------------------------------------------------------------------------
// PROJECT NOVA — standalone configurator
// Real .glb / .gltf / .fbx import with embedded animation clip playback,
// a generic material editor, node visibility, live telemetry HUD, camera
// orbit, and snapshot capture. A procedural "demo vehicle" is the fallback
// / default model. Full CAD (STEP/IGES/CATIA/USD) import, cloud digital-twin
// sync, and live CAN bus / IoT feeds are out of scope for a browser-only build.
// -------------------------------------------------------------------------

const host = document.getElementById('canvas-host');
const viewportTag = document.getElementById('viewport-tag');
const loadingEl = document.getElementById('loading');
const dropOverlay = document.getElementById('drop-overlay');

const scene = new THREE.Scene();
scene.background = new THREE.Color('#0b0d10');
scene.fog = new THREE.Fog('#0b0d10', 16, 34);

const camera = new THREE.PerspectiveCamera(38, host.clientWidth / host.clientHeight, 0.05, 200);
camera.position.set(6, 4, 7);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(host.clientWidth, host.clientHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
if ('outputColorSpace' in renderer) renderer.outputColorSpace = THREE.SRGBColorSpace;
host.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.6, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2 - 0.02;
controls.minDistance = 1.5;
controls.maxDistance = 40;
controls.update();

scene.add(new THREE.HemisphereLight('#8fd8ff', '#0b0d10', 0.55));
const key = new THREE.DirectionalLight('#ffffff', 2.1);
key.position.set(5, 8, 4);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = -8; key.shadow.camera.right = 8;
key.shadow.camera.top = 8; key.shadow.camera.bottom = -8;
scene.add(key);
const rim = new THREE.DirectionalLight('#00b8a9', 0.6);
rim.position.set(-6, 3, -5);
scene.add(rim);

function makeGridTexture() {
  const size = 1024;
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0b0d10';
  ctx.fillRect(0, 0, size, size);
  ctx.strokeStyle = 'rgba(0,184,169,0.16)';
  ctx.lineWidth = 2;
  const step = size / 16;
  for (let i = 0; i <= 16; i++) {
    ctx.beginPath(); ctx.moveTo(i * step, 0); ctx.lineTo(i * step, size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * step); ctx.lineTo(size, i * step); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(0,184,169,0.35)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(size / 2, 0); ctx.lineTo(size / 2, size);
  ctx.moveTo(0, size / 2); ctx.lineTo(size, size / 2); ctx.stroke();
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(10, 10);
  return tex;
}
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(18, 64),
  new THREE.MeshStandardMaterial({ map: makeGridTexture(), roughness: 1, metalness: 0 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// DRACO (for compressed .glb)
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/libs/draco/');

// -------------------------------------------------------------------------
// Model root — holds either the procedural demo car or an imported model
// -------------------------------------------------------------------------
const modelRoot = new THREE.Group();
scene.add(modelRoot);

let mode = 'demo'; // 'demo' | 'imported'
let mixer = null;
let clipRows = []; // { clip, action, name, playing }
let demoParts = null; // refs for the procedural car
let currentObjectURLs = []; // revoke on cleanup

function disposeObject(root) {
  root.traverse((obj) => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
      mats.forEach((m) => {
        Object.keys(m).forEach((key) => {
          const val = m[key];
          if (val && val.isTexture) val.dispose();
        });
        m.dispose();
      });
    }
  });
}

function clearModelRoot() {
  while (modelRoot.children.length) {
    const child = modelRoot.children[0];
    modelRoot.remove(child);
    disposeObject(child);
  }
  currentObjectURLs.forEach((u) => URL.revokeObjectURL(u));
  currentObjectURLs = [];
  mixer = null;
  clipRows = [];
}

function buildWheelMesh(style) {
  const group = new THREE.Group();
  const tireMat = new THREE.MeshStandardMaterial({ color: '#141516', roughness: 0.9, metalness: 0.1 });
  const rimMat = new THREE.MeshStandardMaterial({ color: style.color, roughness: 0.25, metalness: 0.9 });
  const tire = new THREE.Mesh(new THREE.TorusGeometry(style.radius, 0.11, 12, 24), tireMat);
  tire.rotation.y = Math.PI / 2; tire.castShadow = true;
  group.add(tire);
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(style.radius * 0.62, style.radius * 0.62, 0.2, 24), rimMat);
  hub.rotation.z = Math.PI / 2; hub.castShadow = true;
  group.add(hub);
  for (let i = 0; i < style.spokes; i++) {
    const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.06, style.radius * 1.1, 0.18), rimMat);
    spoke.rotation.x = (i / style.spokes) * Math.PI * 2;
    group.add(spoke);
  }
  return group;
}

const WHEEL_STYLE = { color: '#cfd2d4', radius: 0.42, spokes: 5 };

function buildDemoCar() {
  const car = new THREE.Group();
  const bodyMat = new THREE.MeshPhysicalMaterial({ color: '#00b8a9', roughness: 0.32, metalness: 0.85, clearcoat: 0.25, clearcoatRoughness: 0.15 });
  const glassMat = new THREE.MeshPhysicalMaterial({ color: '#9fd0e8', roughness: 0.05, metalness: 0.1, transparent: true, opacity: 0.45 });

  const chassis = new THREE.Mesh(new THREE.BoxGeometry(4.3, 0.5, 1.9), bodyMat);
  chassis.position.y = 0.55; chassis.castShadow = true; car.add(chassis);

  const hood = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.32, 1.8), bodyMat);
  hood.position.set(1.55, 0.78, 0); hood.castShadow = true; car.add(hood);

  const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.62, 1.72), bodyMat);
  cabin.position.set(-0.35, 1.06, 0); cabin.castShadow = true; car.add(cabin);

  const windshield = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.5, 1.6), glassMat);
  windshield.position.set(0.72, 1.08, 0); windshield.rotation.z = -0.35; car.add(windshield);

  const rearGlass = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.45, 1.6), glassMat);
  rearGlass.position.set(-1.35, 1.04, 0); rearGlass.rotation.z = 0.4; car.add(rearGlass);

  const roofPivot = new THREE.Group();
  roofPivot.position.set(-0.35, 1.38, 0);
  const roofMesh = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.08, 1.6), bodyMat);
  roofMesh.castShadow = true; roofPivot.add(roofMesh); car.add(roofPivot);

  [1, -1].forEach((side) => {
    const mirror = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.12, 0.28), bodyMat);
    mirror.position.set(0.95, 1.05, side * 1.0); car.add(mirror);
  });

  const doorPivot = new THREE.Group();
  doorPivot.position.set(-0.25, 0.78, 0.96);
  const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.55, 0.06), bodyMat);
  doorMesh.position.set(0.75, 0, 0); doorMesh.castShadow = true;
  doorPivot.add(doorMesh); car.add(doorPivot);

  const headlightMat = new THREE.MeshStandardMaterial({ color: '#eaf6ff', emissive: '#eaf6ff', emissiveIntensity: 1.4 });
  const taillightMat = new THREE.MeshStandardMaterial({ color: '#ff3b30', emissive: '#ff3b30', emissiveIntensity: 1.1 });
  [1, -1].forEach((side) => {
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.12, 0.4), headlightMat);
    hl.position.set(2.16, 0.62, side * 0.65); car.add(hl);
    const tl = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.14, 0.45), taillightMat);
    tl.position.set(-2.16, 0.66, side * 0.65); car.add(tl);
  });

  const wheelMounts = [];
  [
    { x: 1.5, z: 1.0, front: true }, { x: 1.5, z: -1.0, front: true },
    { x: -1.5, z: 1.0, front: false }, { x: -1.5, z: -1.0, front: false },
  ].forEach((cfg) => {
    const steerGroup = new THREE.Group();
    steerGroup.position.set(cfg.x, 0.42, cfg.z);
    const spinGroup = new THREE.Group();
    spinGroup.add(buildWheelMesh(WHEEL_STYLE));
    steerGroup.add(spinGroup);
    car.add(steerGroup);
    wheelMounts.push({ spinGroup, steerGroup, front: cfg.front });
  });

  return { car, bodyMat, doorPivot, roofPivot, wheelMounts, doorAngle: 0, roofAmount: 0 };
}

function loadDemoCar() {
  clearModelRoot();
  mode = 'demo';
  demoParts = buildDemoCar();
  modelRoot.add(demoParts.car);
  viewportTag.textContent = 'Demo concept vehicle';
  controls.target.set(0, 0.6, 0);
  camera.position.set(6, 4, 7);
  controls.update();
  render();
  renderPanel();
}

// -------------------------------------------------------------------------
// Import pipeline — .glb / .gltf / .fbx, with support for dropping sibling
// resource files (textures, .bin) alongside a loose .gltf or .fbx
// -------------------------------------------------------------------------
function extOf(name) { return name.toLowerCase().split('.').pop(); }

function frameModel(model) {
  let box = new THREE.Box3().setFromObject(model);
  let size = new THREE.Vector3(); box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const scale = 3.4 / maxDim;
  model.scale.setScalar(scale);

  box = new THREE.Box3().setFromObject(model);
  size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);
  model.position.x += -center.x;
  model.position.z += -center.z;
  model.position.y += -box.min.y;

  const dist = Math.max(size.x, size.z) * 1.6 + 3.5;
  controls.target.set(0, size.y * 0.4, 0);
  camera.position.set(dist * 0.55, size.y * 0.6 + dist * 0.4, dist * 0.85);
  controls.update();
}

function finalizeImportedModel(model, animations, fileLabel) {
  clearModelRoot();
  mode = 'imported';
  model.traverse((o) => {
    if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; }
  });
  modelRoot.add(model);
  frameModel(model);

  if (animations && animations.length) {
    mixer = new THREE.AnimationMixer(model);
    clipRows = animations.map((clip, i) => ({
      clip, action: mixer.clipAction(clip), name: clip.name || `Clip ${i + 1}`, playing: false,
    }));
  } else {
    mixer = null; clipRows = [];
  }

  viewportTag.textContent = fileLabel;
  loadingEl.classList.remove('show');
  render();
  setActiveTab('model');
}

function importFiles(fileList) {
  const files = Array.from(fileList);
  if (!files.length) return;
  const main = files.find((f) => ['glb', 'gltf', 'fbx'].includes(extOf(f.name)));
  if (!main) {
    alert('Drop a .glb, .gltf, or .fbx file (you can include sibling .bin / texture files alongside a loose .gltf or .fbx).');
    return;
  }
  loadingEl.classList.add('show');

  const resourceMap = {};
  const objectURLs = [];
  files.forEach((f) => {
    const url = URL.createObjectURL(f);
    objectURLs.push(url);
    resourceMap[f.name] = url;
  });
  currentObjectURLs = objectURLs;

  const manager = new THREE.LoadingManager();
  manager.setURLModifier((url) => {
    const base = decodeURIComponent(url.split('/').pop().split('?')[0]);
    return resourceMap[base] || url;
  });

  const mainURL = resourceMap[main.name];
  const ext = extOf(main.name);

  if (ext === 'glb' || ext === 'gltf') {
    const loader = new GLTFLoader(manager);
    loader.setDRACOLoader(dracoLoader);
    loader.load(
      mainURL,
      (gltf) => finalizeImportedModel(gltf.scene, gltf.animations, main.name),
      undefined,
      (err) => { loadingEl.classList.remove('show'); console.error(err); alert('Could not load that glTF/GLB file: ' + (err?.message || err)); }
    );
  } else if (ext === 'fbx') {
    const loader = new FBXLoader(manager);
    loader.load(
      mainURL,
      (obj) => finalizeImportedModel(obj, obj.animations, main.name),
      undefined,
      (err) => { loadingEl.classList.remove('show'); console.error(err); alert('Could not load that FBX file: ' + (err?.message || err)); }
    );
  }
}

// drag & drop + file picker
const viewport = document.getElementById('viewport');
['dragenter', 'dragover'].forEach((evt) => viewport.addEventListener(evt, (e) => { e.preventDefault(); dropOverlay.classList.add('show'); }));
['dragleave', 'drop'].forEach((evt) => viewport.addEventListener(evt, (e) => { e.preventDefault(); dropOverlay.classList.remove('show'); }));
viewport.addEventListener('drop', (e) => { if (e.dataTransfer.files.length) importFiles(e.dataTransfer.files); });

const fileInput = document.getElementById('file-input');
fileInput.addEventListener('change', (e) => { if (e.target.files.length) importFiles(e.target.files); fileInput.value = ''; });

// -------------------------------------------------------------------------
// Telemetry (simulated)
// -------------------------------------------------------------------------
let engineRunning = false;
let telemetry = { speed: 0, battery: 84, motorTemp: 38, torque: 0 };
setInterval(() => {
  if (!engineRunning) {
    telemetry = {
      speed: Math.max(0, telemetry.speed - 4),
      battery: telemetry.battery,
      motorTemp: Math.max(32, telemetry.motorTemp - 0.4),
      torque: Math.max(0, telemetry.torque - 15),
    };
  } else {
    const targetSpeed = 70 + Math.sin(Date.now() / 1400) * 35;
    const nextSpeed = telemetry.speed + (targetSpeed - telemetry.speed) * 0.08;
    telemetry = {
      speed: Math.max(0, nextSpeed),
      battery: Math.max(0, telemetry.battery - 0.02),
      motorTemp: Math.min(92, 38 + nextSpeed * 0.35 + Math.sin(Date.now() / 900) * 2),
      torque: Math.max(0, 120 + Math.sin(Date.now() / 500) * 40 + nextSpeed * 0.6),
    };
  }
  if (document.querySelector('.tab[data-tab="telemetry"].active')) renderPanel();
}, 150);

// -------------------------------------------------------------------------
// Panel UI
// -------------------------------------------------------------------------
let activeTab = 'model';
const panelBody = document.getElementById('panel-body');

function setActiveTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab').forEach((t) => t.classList.toggle('active', t.dataset.tab === id));
  renderPanel();
}
document.querySelectorAll('.tab').forEach((t) => t.addEventListener('click', () => setActiveTab(t.dataset.tab)));

function el(html) {
  const d = document.createElement('div');
  d.innerHTML = html.trim();
  return d.firstElementChild;
}

function renderPanel() {
  panelBody.innerHTML = '';
  if (activeTab === 'model') renderModelTab();
  else if (activeTab === 'materials') renderMaterialsTab();
  else if (activeTab === 'animation') renderAnimationTab();
  else if (activeTab === 'telemetry') renderTelemetryTab();
  else if (activeTab === 'snapshots') renderSnapshotsTab();
}

function renderModelTab() {
  const wrap = el(`<div class="section"><h3>IMPORT MODEL</h3></div>`);
  const zone = el(`<div class="import-zone"><b>Click to choose</b> or drop a .glb / .gltf / .fbx<br/>onto the viewport</div>`);
  zone.addEventListener('click', () => fileInput.click());
  wrap.appendChild(zone);

  let meshCount = 0, animCount = clipRows.length;
  modelRoot.traverse((o) => { if (o.isMesh) meshCount++; });
  const meta = el(`<div class="file-meta">
    <div><b>Source:</b> ${mode === 'demo' ? 'procedural demo vehicle' : viewportTag.textContent}</div>
    <div><b>Meshes:</b> ${meshCount}</div>
    <div><b>Embedded animation clips:</b> ${animCount}</div>
  </div>`);
  wrap.appendChild(meta);
  panelBody.appendChild(wrap);

  const hier = el(`<div class="section"><h3>SCENE HIERARCHY</h3></div>`);
  const list = el(`<div></div>`);
  let any = false;
  modelRoot.traverse((o) => {
    if (!o.isMesh) return;
    any = true;
    const depth = getDepth(o);
    const row = el(`<div class="node-row">
      <span class="node-depth">${'›'.repeat(Math.min(depth, 4))}</span>
      <input type="checkbox" ${o.visible ? 'checked' : ''} />
      <span>${o.name || '(unnamed mesh)'}</span>
    </div>`);
    row.querySelector('input').addEventListener('change', (e) => { o.visible = e.target.checked; });
    list.appendChild(row);
  });
  if (!any) list.appendChild(el(`<div class="empty">No mesh nodes found.</div>`));
  hier.appendChild(list);
  panelBody.appendChild(hier);

  const note = el(`<div class="note">Full STEP / IGES / Parasolid / CATIA / JT / USD import needs a CAD-kernel service — this build supports the web-native formats (.glb, .gltf, .fbx) directly in-browser. If a loose .gltf references separate .bin or texture files, select or drop them together with the .gltf so they resolve correctly.</div>`);
  panelBody.appendChild(note);
}

function getDepth(o) { let d = 0, p = o; while (p.parent && p.parent !== modelRoot) { d++; p = p.parent; } return d; }

function collectMaterials() {
  const map = new Map();
  modelRoot.traverse((o) => {
    if (!o.isMesh || !o.material) return;
    const mats = Array.isArray(o.material) ? o.material : [o.material];
    mats.forEach((m) => {
      if (!map.has(m.uuid)) map.set(m.uuid, { mat: m, names: new Set() });
      map.get(m.uuid).names.add(o.name || 'mesh');
    });
  });
  return Array.from(map.values());
}

function renderMaterialsTab() {
  const wrap = el(`<div class="section"><h3>MATERIAL EDITOR</h3></div>`);
  panelBody.appendChild(wrap);
  const mats = collectMaterials();
  if (!mats.length) { panelBody.appendChild(el(`<div class="empty">No materials found on the current model.</div>`)); return; }

  mats.forEach(({ mat, names }) => {
    const label = mat.name || Array.from(names).slice(0, 2).join(', ') || 'Material';
    const hasColor = !!mat.color;
    const hasRough = mat.roughness !== undefined;
    const hasMetal = mat.metalness !== undefined;
    const card = el(`<div class="mat-card">
      <div class="name">${label}</div>
      ${hasColor ? `<input type="color" value="${'#' + mat.color.getHexString()}" />` : ''}
      ${hasRough ? `<div class="row"><label>Roughness</label><input type="range" min="0" max="1" step="0.01" value="${mat.roughness}" /></div>` : ''}
      ${hasMetal ? `<div class="row"><label>Metalness</label><input type="range" min="0" max="1" step="0.01" value="${mat.metalness}" /></div>` : ''}
    </div>`);
    if (hasColor) card.querySelector('input[type=color]').addEventListener('input', (e) => { mat.color.set(e.target.value); });
    const ranges = card.querySelectorAll('input[type=range]');
    let idx = 0;
    if (hasRough) { ranges[idx].addEventListener('input', (e) => { mat.roughness = Number(e.target.value); }); idx++; }
    if (hasMetal) { ranges[idx].addEventListener('input', (e) => { mat.metalness = Number(e.target.value); }); }
    panelBody.appendChild(card);
  });
}

function renderAnimationTab() {
  if (mode === 'demo') {
    const wrap = el(`<div class="section"><h3>ANIMATION</h3></div>`);
    panelBody.appendChild(wrap);

    const doorRow = el(`<div class="clip-row"><div class="top"><span class="name">Driver door</span></div></div>`);
    const doorToggle = el(`<button class="toggle ${demoParts.doorAngle > 0.5 ? 'on' : ''}"><span class="knob"></span></button>`);
    doorRow.querySelector('.top').appendChild(doorToggle);
    doorToggle.addEventListener('click', () => {
      demoParts.doorTarget = demoParts.doorTarget ? 0 : 1;
      doorToggle.classList.toggle('on');
    });
    panelBody.appendChild(doorRow);

    const roofRow = el(`<div class="clip-row"><div class="top"><span class="name">Targa roof</span></div></div>`);
    const roofToggle = el(`<button class="toggle"><span class="knob"></span></button>`);
    roofRow.querySelector('.top').appendChild(roofToggle);
    roofToggle.addEventListener('click', () => {
      demoParts.roofTarget = demoParts.roofTarget ? 0 : 1;
      roofToggle.classList.toggle('on');
    });
    panelBody.appendChild(roofRow);

    const steerWrap = el(`<div class="section"><label style="font-size:11px;color:var(--muted2);display:block;margin-bottom:6px;">Steering angle</label></div>`);
    const steerInput = el(`<input type="range" min="-100" max="100" value="0" style="width:100%;accent-color:var(--accent);" />`);
    steerInput.addEventListener('input', (e) => {
      const rad = (Number(e.target.value) / 100) * 0.5;
      demoParts.wheelMounts.forEach((wm) => { if (wm.front) wm.steerGroup.rotation.y = rad; });
    });
    steerWrap.appendChild(steerInput);
    panelBody.appendChild(steerWrap);
    return;
  }

  const wrap = el(`<div class="section"><h3>EMBEDDED ANIMATION CLIPS</h3></div>`);
  panelBody.appendChild(wrap);

  if (!clipRows.length) {
    panelBody.appendChild(el(`<div class="empty">This file has no embedded animation clips.</div>`));
    return;
  }

  clipRows.forEach((row, i) => {
    const card = el(`<div class="clip-row">
      <div class="top">
        <span class="name">${row.name}</span>
      </div>
      <div class="meta">${row.clip.duration.toFixed(2)}s · ${row.clip.tracks.length} tracks</div>
    </div>`);
    const toggle = el(`<button class="toggle ${row.playing ? 'on' : ''}"><span class="knob"></span></button>`);
    card.querySelector('.top').appendChild(toggle);
    toggle.addEventListener('click', () => {
      row.playing = !row.playing;
      toggle.classList.toggle('on');
      if (row.playing) { row.action.reset(); row.action.play(); }
      else { row.action.stop(); }
    });
    panelBody.appendChild(card);
  });

  const speedWrap = el(`<div class="section"><label style="font-size:11px;color:var(--muted2);display:block;margin-bottom:6px;">Playback speed</label></div>`);
  const speedInput = el(`<input type="range" min="0" max="2" step="0.05" value="1" style="width:100%;accent-color:var(--accent);" />`);
  speedInput.addEventListener('input', (e) => { if (mixer) mixer.timeScale = Number(e.target.value); });
  speedWrap.appendChild(speedInput);
  panelBody.appendChild(speedWrap);

  panelBody.appendChild(el(`<div class="note">NLA-style layering: toggle multiple clips on at once to play them simultaneously on shared bones/nodes (last-writer-wins per property, not weighted blending).</div>`));
}

function renderTelemetryTab() {
  const wrap = el(`<div class="section"><h3>LIVE TELEMETRY</h3></div>`);
  panelBody.appendChild(wrap);

  const engRow = el(`<div class="row" style="margin-bottom:14px;"><label style="width:auto;font-size:12px;color:#c7ccce;">Engine / drive cycle</label></div>`);
  const engToggle = el(`<button class="toggle ${engineRunning ? 'on' : ''}"><span class="knob"></span></button>`);
  engRow.appendChild(engToggle);
  engToggle.addEventListener('click', () => { engineRunning = !engineRunning; engToggle.classList.toggle('on'); });
  panelBody.appendChild(engRow);

  const rows = [
    ['Speed', telemetry.speed.toFixed(0), 'km/h'],
    ['Battery', telemetry.battery.toFixed(1), '%'],
    ['Motor temp', telemetry.motorTemp.toFixed(1), '°C'],
    ['Torque', telemetry.torque.toFixed(0), 'Nm'],
  ];
  rows.forEach(([label, value, unit]) => {
    panelBody.appendChild(el(`<div class="telemetry-row"><span class="label">${label}</span><span class="value">${value}<span class="unit">${unit}</span></span></div>`));
  });
  panelBody.appendChild(el(`<div class="note">Simulated stream — a production build would bind these fields to CAN bus / MQTT / a live IoT feed instead.</div>`));
}

const snapshots = [];
function renderSnapshotsTab() {
  const wrap = el(`<div class="section"><h3>SNAPSHOT GALLERY</h3></div>`);
  panelBody.appendChild(wrap);
  if (!snapshots.length) { panelBody.appendChild(el(`<div class="empty">No snapshots yet — capture one from the viewport.</div>`)); return; }
  snapshots.forEach((s) => {
    const card = el(`<div class="snap-card"><img src="${s.url}" /><div class="snap-meta"><span>${s.time}</span></div></div>`);
    const a = el(`<a href="${s.url}" download="nova-snapshot-${s.id}.png">download</a>`);
    card.querySelector('.snap-meta').appendChild(a);
    panelBody.appendChild(card);
  });
}

document.getElementById('btn-snapshot').addEventListener('click', () => {
  renderer.render(scene, camera);
  const url = renderer.domElement.toDataURL('image/png');
  snapshots.unshift({ id: Date.now(), url, time: new Date().toLocaleTimeString() });
  if (snapshots.length > 6) snapshots.length = 6;
  if (activeTab === 'snapshots') renderPanel();
});

document.getElementById('btn-reset').addEventListener('click', loadDemoCar);

document.getElementById('btn-export').addEventListener('click', () => {
  const meshVisibility = [];
  modelRoot.traverse((o) => { if (o.isMesh) meshVisibility.push({ name: o.name || '(unnamed)', visible: o.visible }); });
  const config = {
    project: 'PROJECT NOVA — configurator export',
    timestamp: new Date().toISOString(),
    source: mode === 'demo' ? 'procedural demo vehicle' : viewportTag.textContent,
    meshVisibility,
    animationClips: clipRows.map((r) => ({ name: r.name, playing: r.playing, duration: r.clip.duration })),
    telemetrySnapshot: telemetry,
  };
  const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'nova-configuration.json'; a.click();
  URL.revokeObjectURL(url);
});

// -------------------------------------------------------------------------
// Resize + render loop
// -------------------------------------------------------------------------
function onResize() {
  const w = host.clientWidth, h = host.clientHeight;
  camera.aspect = w / h; camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}
window.addEventListener('resize', onResize);
new ResizeObserver(onResize).observe(host);

const clock = new THREE.Clock();
function render() { renderer.render(scene, camera); }

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  controls.update();

  if (mode === 'demo' && demoParts) {
    const dp = demoParts;
    const doorTarget = dp.doorTarget || 0;
    dp.doorAngle += (doorTarget - dp.doorAngle) * Math.min(1, dt * 4);
    dp.doorPivot.rotation.y = -dp.doorAngle * 0.9;

    const roofTarget = dp.roofTarget || 0;
    dp.roofAmount += (roofTarget - dp.roofAmount) * Math.min(1, dt * 3);
    dp.roofPivot.position.y = 1.38 + dp.roofAmount * 0.5;
    dp.roofPivot.position.x = -0.35 - dp.roofAmount * 1.6;

    const spinSpeed = (telemetry.speed / 3.6) * dt / 0.42;
    dp.wheelMounts.forEach((wm) => { wm.spinGroup.rotation.x += spinSpeed; });
  }

  if (mixer) mixer.update(dt);

  renderer.render(scene, camera);
}

// -------------------------------------------------------------------------
// Auto-load a server-hosted asset on launch
// -------------------------------------------------------------------------
// Path is relative to this HTML file's own location on the server. If
// SUV.glb sits in the same folder as this file, the default below works
// as-is. If it lives elsewhere, change the path (e.g. './models/SUV.glb'
// or an absolute '/assets/SUV.glb').
const DEFAULT_ASSET_URL = 'SUV.glb';

function loadAssetFromURL(url, label) {
  loadingEl.classList.add('show');
  viewportTag.textContent = `Loading ${label || url}…`;
  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);
  loader.load(
    url,
    (gltf) => finalizeImportedModel(gltf.scene, gltf.animations, label || url),
    undefined,
    (err) => {
      loadingEl.classList.remove('show');
      console.warn(`Could not auto-load "${url}" — falling back to the demo vehicle.`, err);
      loadDemoCar();
    }
  );
}

loadAssetFromURL(DEFAULT_ASSET_URL, 'SUV.glb');
animate();
</script>
